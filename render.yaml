services:
  # 1. FastAPI Python Backend
  - type: web
    name: stitch-ats-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: python -m uvicorn backend.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: OPENAI_API_KEY
        sync: false # Render will prompt you to type your OpenAI key

  # 2. React Static Frontend
  - type: web
    name: stitch-ats-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
